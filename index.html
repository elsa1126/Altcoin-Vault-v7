<!DOCTYPE html>
<html lang="zh-TW" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>策略看板 | Strategy Board</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="策略看板">
    <meta name="theme-color" content="#0B0E14">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="shortcut icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-root: #0B0E14;
            --bg-surface: #12161E;
            --bg-card: #1A1F2E;
            --bg-elevated: #1E2436;
            --bg-input: #0F1219;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-default: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(99, 138, 255, 0.35);
            --text-primary: #E8ECF4;
            --text-secondary: #8B95A8;
            --text-muted: #525C6F;
            --accent: #638AFF;
            --green: #34D399;
            --red: #F87171;
            --amber: #FBBF24;
            --cyan: #22D3EE
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-root);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden
        }

        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 2px
        }

        input,
        select {
            background: var(--bg-input);
            border: 1px solid var(--border-default);
            color: #fff;
            border-radius: 8px;
            transition: border-color .15s
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(99, 138, 255, 0.15)
        }

        .coin-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 14px 16px;
            cursor: pointer;
            transition: all .2s ease;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        .coin-card:hover {
            background: var(--bg-elevated);
            border-color: var(--border-hover)
        }

        .coin-card:active {
            transform: scale(0.98)
        }

        .coin-card.holding {
            border-left: 3px solid var(--accent)
        }

        .coin-card.target-hit {
            border: 1px solid rgba(251, 191, 36, 0.5);
            border-left: 3px solid var(--amber);
            animation: gold-pulse 2.5s ease-in-out infinite
        }

        @keyframes gold-pulse {

            0%,
            100% {
                box-shadow: 0 0 8px rgba(251, 191, 36, 0.2)
            }

            50% {
                box-shadow: 0 0 20px rgba(251, 191, 36, 0.3)
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .coin-card {
            animation: fadeUp .3s ease both
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all .3s ease;
            z-index: 40
        }

        .overlay.active {
            opacity: 1;
            visibility: visible
        }

        #side-panel, #notif-panel {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: min(320px, 85vw);
            background: var(--bg-surface);
            border-left: 1px solid var(--border-subtle);
            transform: translateX(100%);
            transition: transform .35s cubic-bezier(.4, 0, .2, 1);
            z-index: 50;
            overflow-y: auto;
            padding: calc(env(safe-area-inset-top) + 24px) 20px calc(env(safe-area-inset-bottom) + 24px) 20px;
        }

        #side-panel.open, #notif-panel.open {
            transform: translateX(0)
        }

        .notif-badge {
            position: absolute; top: -2px; right: -2px;
            min-width: 16px; height: 16px;
            background: var(--red); color: #fff;
            border-radius: 99px; font-size: 9px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            padding: 0 4px; line-height: 1;
            border: 2px solid var(--bg-root);
            pointer-events: none;
        }
        .notif-badge:empty, .notif-badge[data-count="0"] { display: none; }

        .notif-item {
            padding: 12px 14px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            transition: all .15s ease;
        }
        .notif-item:hover { background: rgba(255,255,255,0.04); }
        .notif-item + .notif-item { margin-top: 8px; }
        .notif-item .notif-emoji { font-size: 18px; line-height: 1; }
        .notif-item .notif-title { font-size: 12px; font-weight: 600; color: var(--text-primary); }
        .notif-item .notif-body { font-size: 10px; color: var(--text-secondary); margin-top: 3px; line-height: 1.5; }
        .notif-item .notif-time { font-size: 9px; color: var(--text-muted); margin-top: 5px; font-family: monospace; }

        #bottom-sheet {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            max-height: 85vh;
            background: var(--bg-surface);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px 20px 0 0;
            transform: translateY(100%);
            transition: transform .35s cubic-bezier(.4, 0, .2, 1);
            z-index: 50;
            overflow-y: auto;
            padding: 12px 20px calc(env(safe-area-inset-bottom) + 32px)
        }

        #bottom-sheet.open {
            transform: translateY(0)
        }

        .sheet-handle {
            width: 36px;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            margin: 0 auto 16px
        }

        #sort-menu {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-surface);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px 20px 0 0;
            transform: translateY(100%);
            transition: transform .35s cubic-bezier(.4, 0, .2, 1);
            z-index: 45;
            padding: 16px 20px 100px
        }

        #sort-menu.open {
            transform: translateY(0)
        }

        #pill-menu {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 46;
            background: rgba(18, 22, 30, 0.78);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 5px 6px;
            display: flex;
            align-items: center;
            gap: 2px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4)
        }

        .pill-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 10px 14px;
            border-radius: 44px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all .15s ease;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent
        }

        .pill-btn:active {
            transform: scale(0.95)
        }

        .pill-btn.active {
            color: var(--accent);
            background: rgba(99, 138, 255, 0.12)
        }

        .pill-filter {
            flex: 1;
            text-align: center;
            padding: 10px 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            cursor: pointer;
            border-radius: 44px;
            transition: all .15s ease;
            -webkit-tap-highlight-color: transparent;
            border: none;
            background: transparent
        }

        .pill-filter:active {
            transform: scale(0.95)
        }

        #pill-search {
            display: none;
            flex: 1;
            align-items: center;
            gap: 8px;
            padding: 0 4px
        }

        #pill-search.active {
            display: flex
        }

        #pill-search input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 13px;
            width: 100%;
            padding: 8px 0
        }

        #pill-search input:focus {
            outline: none;
            box-shadow: none
        }

        .sort-opt {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: all .15s ease;
            -webkit-tap-highlight-color: transparent
        }

        .sort-opt:hover {
            background: rgba(255, 255, 255, 0.04)
        }

        .sort-opt:active {
            transform: scale(0.98)
        }

        .sort-opt.active {
            background: rgba(99, 138, 255, 0.1);
            color: var(--accent)
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 0;
            border-bottom: 1px solid var(--border-subtle)
        }

        .detail-row:last-child {
            border-bottom: none
        }

        .optional-detail {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all .3s ease;
            border-top: 1px solid transparent;
            margin-top: 0
        }

        @media (hover: hover) {
            .coin-card:hover .optional-detail {
                max-height: 200px;
                opacity: 1;
                margin-top: 10px;
                padding-top: 10px;
                border-top-color: rgba(255, 255, 255, 0.04);
            }
        }

        .coin-card.expanded .optional-detail {
            max-height: 200px;
            opacity: 1;
            margin-top: 10px;
            padding-top: 10px;
            border-top-color: rgba(255, 255, 255, 0.04);
        }

        /* === GLOBAL DASHBOARD === */
        #gd {
            position: fixed;
            bottom: 90px;
            left: 14px;
            z-index: 47;
            width: 38px;
            height: 38px;
            background: rgba(15,18,25,0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 19px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            overflow: hidden;
            transition: all .35s cubic-bezier(.4,0,.2,1);
            max-height: 38px;
            cursor: pointer;
        }
        #gd:hover, #gd.open {
            width: min(310px, calc(100vw - 28px));
            border-radius: 16px;
        }
        #gd.open { max-height: 700px; height: auto; cursor: default; }
        
        #gd-header-wrap {
            display: flex;
            width: min(310px, calc(100vw - 28px));
            height: 38px;
            align-items: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }
        #gd-header-icon {
            display: flex; justify-content: center; align-items: center;
            width: 38px; height: 38px; flex-shrink: 0; font-size: 15px;
        }
        #gd-header-content {
            display: flex; align-items: center; justify-content: space-between;
            flex: 1; padding-right: 12px;
            opacity: 0; transition: opacity .2s; white-space: nowrap;
        }
        #gd:hover #gd-header-content, #gd.open #gd-header-content {
            opacity: 1;
        }
        #gd-body { padding: 0 12px 14px; }
        .gd-lbl {
            font-size: 9px; font-weight: 700; text-transform: uppercase;
            letter-spacing: .06em; color: var(--text-muted); margin-bottom: 3px;
        }
        .gd-val { font-size: 13px; font-weight: 700; font-family: monospace; }
        .gd-inp {
            width: 100%; font-size: 12px; padding: 6px 8px; border-radius: 8px;
            background: var(--bg-input); border: 1px solid var(--border-default);
            color: #fff; transition: border-color .15s;
        }
        .gd-inp:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(99,138,255,.15); }
        .gd-divider { height:1px; background:rgba(255,255,255,.05); margin: 10px 0; }
        .prog-wrap { margin-top: 6px; }
        .prog-row-labels { display:flex; justify-content:space-between; font-size:9px; color:var(--text-muted); margin-bottom:2px; }
        .prog-track {
            position: relative; height: 7px;
            background: rgba(255,255,255,.06); border-radius: 99px;
            overflow: visible; margin: 3px 0;
        }
        .prog-fill {
            position:absolute; left:0; top:0; height:100%; border-radius:99px;
            transition: width .6s ease;
        }
        .prog-dot {
            position:absolute; top:50%; transform:translate(-50%,-50%);
            width:11px; height:11px; border-radius:50%;
            border: 2px solid #0F1219; transition: left .6s ease;
        }
        .prog-bot-labels { display:flex; justify-content:space-between; font-size:9px; color:var(--text-muted); margin-top:2px; }

        @media (min-width: 1024px) {
            #bottom-sheet, #sort-menu {
                right: 0;
                left: auto;
                width: 400px;
                top: 0;
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                border-top: none;
                border-left: 1px solid var(--border-subtle);
                transform: translateX(100%);
                padding: calc(env(safe-area-inset-top) + 24px) 24px 24px 24px;
            }
            #bottom-sheet.open, #sort-menu.open { transform: translateX(0); }
            .sheet-handle { display: none; }
            #pill-menu { display: none !important; }

            #gd {
                top: 0;
                bottom: 0;
                left: 0;
                width: 320px;
                max-height: 100vh;
                height: 100vh;
                border-radius: 0;
                cursor: default;
                box-shadow: none;
                background: var(--bg-surface);
                border: none;
                border-right: 1px solid var(--border-subtle);
                padding-top: calc(env(safe-area-inset-top) + 20px);
                z-index: 40;
            }
            #gd:hover, #gd.open { width: 320px; max-height: 100vh; }
            #gd-header-wrap {
                width: 100%;
                cursor: default;
                height: auto;
                border-bottom: 1px solid rgba(255,255,255,0.04);
                margin-bottom: 12px;
                padding: 10px 20px 20px 20px;
            }
            #gd-header-icon { font-size: 24px; width: 40px; height: 40px; justify-content: flex-start; }
            #gd-header-content { opacity: 1; }
            #gd-header-content > div > span:first-child { font-size: 14px !important; font-weight: 700 !important; color: #fff !important; }
            #gd-chevron { display: none; }
            
            #gd-body { padding: 0 20px 24px 20px; }
            #gd-body .gd-lbl { font-size: 10px; margin-bottom: 6px; color: #8B95A8; }
            #gd-body .gd-inp { font-size: 14px; padding: 10px 12px; line-height: 1.4 !important; }
            #gd-body .gd-val { font-size: 17px; }
            #gd-body > div[style*="background"] { padding: 12px 14px !important; margin-bottom: 16px !important; }
            #gd-body .gd-divider { margin: 20px 0; }
            #gd-body .prog-row-labels span, #gd-body .prog-bot-labels span { font-size: 10px; }
            #gd-body .prog-wrap { margin-top: 12px !important; }
            #gd-body .prog-track { height: 8px; margin: 8px 0; }
            #gd-body .prog-dot { width: 14px; height: 14px; border-width: 3px; }
            
            #coin-container {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 16px;
            }
            #coin-container > .py-16 { grid-column: 1 / -1; }
            
            @media (min-width: 1440px) {
                #coin-container { grid-template-columns: repeat(3, minmax(0, 1fr)); }
            }
        }
    </style>
</head>

<body class="min-h-screen pb-24">

    <!-- Global Dashboard -->
    <div id="gd">
        <div id="gd-header-wrap" onclick="toggleGD()">
            <div id="gd-header-icon">📊</div>
            <div id="gd-header-content">
                <div style="display:flex;align-items:center;gap:7px">
                    <span style="font-size:11px;font-weight:600;color:var(--text-secondary)">資金看板</span>
                    <span id="gd-pill" style="font-size:10px;font-weight:700;font-family:monospace"></span>
                </div>
                <svg id="gd-chevron" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="color:var(--text-muted);transition:transform .35s"><path d="M18 15l-6-6-6 6"/></svg>
            </div>
        </div>
        <div id="gd-body">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
                <div>
                    <p class="gd-lbl">清單總投入 (自動加總)</p>
                    <div class="gd-inp" id="gd-principal-disp" style="color:var(--text-muted);cursor:default;line-height:1.6">—</div>
                </div>
                <div>
                    <p class="gd-lbl">歷史已實現損益</p>
                    <input class="gd-inp" type="number" id="gd-realized" placeholder="+/-" oninput="gdSaveLocal()" onchange="gdSaveCloud()">
                </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
                <div>
                    <p class="gd-lbl">目標總獲利 (自動估算)</p>
                    <div class="gd-inp" id="gd-target-profit-disp" style="color:var(--text-muted);cursor:default;line-height:1.6">—</div>
                </div>
                <div>
                    <p class="gd-lbl">浮動損益 (自動)</p>
                    <div class="gd-inp" id="gd-float" style="color:var(--text-muted);cursor:default;line-height:1.6">—</div>
                </div>
            </div>
            <div style="background:rgba(99,138,255,.08);border:1px solid rgba(99,138,255,.15);border-radius:10px;padding:8px 10px;margin-bottom:10px">
                <div style="display:flex;justify-content:space-between;align-items:center">
                    <p class="gd-lbl" style="margin:0">目前總獲利</p>
                    <span id="gd-total-profit" class="gd-val" style="color:var(--accent)">--</span>
                </div>
            </div>

            <div class="gd-divider"></div>

            <div class="prog-wrap">
                <div class="prog-row-labels">
                    <span style="color:var(--text-muted)">漲幅進度 (%)</span>
                    <span id="gd-bar-a-pct" style="color:var(--green);font-weight:700"></span>
                    <span style="color:var(--text-muted)">目標 100%</span>
                </div>
                <div class="prog-track">
                    <div class="prog-fill" id="gd-bar-a-fill" style="background:linear-gradient(90deg,#638AFF,#22D3EE)"></div>
                    <div class="prog-dot" id="gd-bar-a-dot" style="background:var(--accent)"></div>
                </div>
                <div class="prog-bot-labels">
                    <span>0%</span>
                    <span id="gd-bar-a-mid" style="color:var(--accent)"></span>
                    <span>100%</span>
                </div>
            </div>

            <div class="prog-wrap" style="margin-top:10px">
                <div class="prog-row-labels">
                    <span style="color:var(--text-muted)">資金進度 (USDT)</span>
                    <span id="gd-bar-b-lbl" style="font-weight:600"></span>
                    <span id="gd-bar-b-right" style="color:var(--text-muted)"></span>
                </div>
                <div class="prog-track">
                    <div class="prog-fill" id="gd-bar-b-fill" style="background:linear-gradient(90deg,#34D399,#22D3EE)"></div>
                    <div class="prog-dot" id="gd-bar-b-dot" style="background:var(--green)"></div>
                </div>
                <div class="prog-bot-labels">
                    <span id="gd-bar-b-l">$0</span>
                    <span id="gd-bar-b-m" style="color:var(--green)"></span>
                    <span id="gd-bar-b-r">--</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Overlays -->
    <div id="side-overlay" class="overlay" onclick="toggleSidePanel()"></div>
    <div id="notif-overlay" class="overlay" onclick="toggleNotifPanel()"></div>
    <div id="sheet-overlay" class="overlay" onclick="closeBottomSheet()"></div>
    <div id="sort-overlay" class="overlay" style="z-index:44" onclick="toggleSortMenu()"></div>

    <!-- Side Panel -->
    <div id="side-panel">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-bold">個人中心</h2>
            <button onclick="toggleSidePanel()"
                class="text-[#525C6F] hover:text-white text-xl transition">&times;</button>
        </div>
        <div id="sync-status"
            class="text-[11px] px-3 py-1.5 rounded-lg bg-white/[0.04] text-[#525C6F] font-medium mb-6 text-center">
            訪客觀看模式</div>

        <div class="mb-6">
            <p class="text-[10px] text-[#525C6F] font-semibold uppercase tracking-wide mb-2">雲端區塊 (Bin ID)</p>
            <div class="flex gap-2">
                <input type="text" id="sync-bin" placeholder="Bin ID" class="flex-1 text-xs p-2.5">
                <button id="guest-refresh-btn" onclick="guestRefresh()"
                    class="px-3 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 rounded-lg text-xs hover:bg-emerald-500/20 transition font-semibold whitespace-nowrap">🔄</button>
            </div>
        </div>

        <div class="mb-6 space-y-3">
            <p class="text-[10px] text-[#525C6F] font-semibold uppercase tracking-wide">管理員登入</p>
            <input type="email" id="admin-user" placeholder="帳號" class="w-full text-xs p-2.5" autocomplete="off">
            <input type="password" id="admin-pass" placeholder="密碼" class="w-full text-xs p-2.5" autocomplete="off">
            <button onclick="toggleAdminLogin()" id="login-btn"
                class="w-full py-2.5 bg-[#638AFF]/10 text-[#638AFF] border border-[#638AFF]/25 rounded-lg text-xs hover:bg-[#638AFF]/20 transition font-semibold">登入</button>

    function formatRelativeTime(ts) { if (!ts) return '未曾設定'; const diff = Date.now() - ts; if (diff < 60000) return '剛剛'; const m = Math.floor(diff / 60000); if (m < 60) return `${m} 分鐘前`; const h = Math.floor(m / 60); if (h < 24) return `${h} 小時前`; const d = new Date(ts); return `${d.getMonth() + 1}/${d.getDate()} ${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}` }

    async function pushToCloud(manual = false) { if (!cloudKey || !cloudBin) { if (manual) alert("請先建立區塊！"); return } const btn = document.getElementById('push-btn'); if (manual && btn) btn.innerText = "上傳中..."; try { const r = await fetch("https://api.jsonbin.io/v3/b/" + cloudBin, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': cloudKey }, body: JSON.stringify(userSettings) }); if (r.status === 401 || r.status === 403) { alert("授權錯誤！"); toggleAdminLogin() } else if (r.ok && manual) alert("✅ 同步成功！") } catch (e) { if (manual) alert("❌ " + e.message) } if (manual && btn) btn.innerText = "強制上傳雲端 ⬆️" }

    const PROXY_LIST = [
        (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,

    async function fetchJsonWithFallback(baseUrl, preferredProxyIdx = 0) {
        try {
            const directRes = await fetch(baseUrl, window.AbortSignal && window.AbortSignal.timeout ? { signal: AbortSignal.timeout(5000) } : {});
            if (directRes.ok) return await directRes.json();
        } catch (e) {}

        const urlWithCacheBuster = baseUrl.includes('?') ? `${baseUrl}&_t=${Date.now()}` : `${baseUrl}?_t=${Date.now()}`;
        
        for (let i = 0; i < PROXY_LIST.length; i++) {
            const idx = (preferredProxyIdx + i) % PROXY_LIST.length;
            const fullUrl = PROXY_LIST[idx](urlWithCacheBuster);
            try {
                const res = await fetch(fullUrl, window.AbortSignal && window.AbortSignal.timeout ? { signal: AbortSignal.timeout(8000) } : {});
                if (!res.ok) continue; 
                const text = await res.text();
                const json = JSON.parse(text);
                if (json && json.error) continue; 
                return json;
            } catch (e) {}
        }
        return null;
    }

    async function fetchCandleHighLow(coin, idxOffset = 0) {
        try {
            const data = await fetchJsonWithFallback(`https://api.gateio.ws/api/v4/spot/candlesticks?currency_pair=${coin}_USDT&interval=5m&limit=2`, idxOffset);
            if (Array.isArray(data) && data.length > 0) {
                let high = 0, low = Infinity;
                data.forEach(c => { high = Math.max(high, Number(c[3])); low = Math.min(low, Number(c[4])); });
                if (high > 0 && low < Infinity) return { high, low };
            }
        } catch (e) {}
        try {
            const d = await fetchJsonWithFallback(`https://www.okx.com/api/v5/market/candles?instId=${coin}-USDT&bar=5m&limit=2`, (idxOffset + 1));
            if (d.data && d.data.length > 0) {
                let high = 0, low = Infinity;
                d.data.forEach(c => { high = Math.max(high, Number(c[2])); low = Math.min(low, Number(c[3])); });
                if (high > 0 && low < Infinity) return { high, low };
            }
        } catch (e) {}
        try {
            const b = await fetchJsonWithFallback(`https://api.binance.com/api/v3/klines?symbol=${coin}USDT&interval=5m&limit=2`, (idxOffset + 2));
            if (Array.isArray(b) && b.length > 0) {
                let high = 0, low = Infinity;
                b.forEach(c => { high = Math.max(high, Number(c[2])); low = Math.min(low, Number(c[3])); });
                if (high > 0 && low < Infinity) return { high, low };
            }
        } catch (e) {}
        try {
            const m = await fetchJsonWithFallback(`https://api.mexc.com/api/v3/klines?symbol=${coin}USDT&interval=5m&limit=2`, (idxOffset + 3));
            if (Array.isArray(m) && m.length > 0) {
                let high = 0, low = Infinity;
                m.forEach(c => { high = Math.max(high, Number(c[2])); low = Math.min(low, Number(c[3])); });
                if (high > 0 && low < Infinity) return { high, low };
            }
        } catch (e) {}
        
        return null;
    }

    async function checkAutoEntry() {
        // 💡 防呆機制 1：訪客模式絕對不執行自動觸發與推播，避免本地狀態無法上傳導致無限迴圈
        if (!isAdmin) return;

        const klineCoins = COIN_LIST.filter(coin => {
            const s = userSettings[coin];
            if (!s) return false;
            // 💡 防呆機制 2：加入 !wasNotified(coin, 'entry') 阻斷 24 小時內重複發送
            if (!s.isHolding && s.entry > 0 && s.entrySide && !wasNotified(coin, 'entry')) return true; 
            if (s.isHolding && s.target > 0 && s.manualStatus !== 'target_reached' && !wasNotified(coin, 'target')) return true; 
            if (s.isHolding && s.stopLoss > 0 && s.manualStatus !== 'no_market' && !wasNotified(coin, 'stoploss')) return true; 
            return false;
        });

        const klineData = {};
        if (klineCoins.length > 0) {
            await Promise.allSettled(
                klineCoins.map(async (coin, index) => {
                    await new Promise(r => setTimeout(r, index * 250));
                    const hl = await fetchCandleHighLow(coin, index);
                    if (hl) klineData[coin] = hl;
                })
            );
        }

        let entryTrig = [], targetTrig = [], slTrig = [];
        COIN_LIST.forEach(coin => {
            const s = userSettings[coin], m = marketData[coin];
            if (!s || !m) return;
            const p = Number(m.price), e = Number(s.entry), t = Number(s.target), sl = Number(s.stopLoss);
            if (p <= 0) return;

            const kl = klineData[coin];
            const checkHigh = kl ? kl.high : p; 
            const checkLow  = kl ? kl.low  : p; 

            // --- Auto Entry ---
            if (!s.isHolding && s.entry && s.entrySide && e > 0 && !wasNotified(coin, 'entry')) {
                let go = false;
                if (s.entrySide === 'breakout' && checkHigh >= e) go = true;
                if (s.entrySide === 'dip' && checkLow <= e) go = true;
                if (go) {
                    userSettings[coin].isHolding = true;
                    userSettings[coin].entrySide = null;
                    userSettings[coin].lastManualUpdate = Date.now();
                    markNotified(coin, 'entry');
                    entryTrig.push(coin);
                }
            }

            // --- Target Reached ---
            if (s.isHolding && t > 0 && checkHigh >= t && s.manualStatus !== 'target_reached' && !wasNotified(coin, 'target')) {
                userSettings[coin].manualStatus = 'target_reached';
                userSettings[coin].lastManualUpdate = Date.now();
                markNotified(coin, 'target');
                targetTrig.push(coin);
            }

            // --- Stop Loss Hit ---
            if (s.isHolding && sl > 0 && checkLow <= sl && s.manualStatus !== 'no_market' && !wasNotified(coin, 'stoploss')) {
                userSettings[coin].isHolding = false;
                userSettings[coin].entrySide = null;
                userSettings[coin].manualStatus = 'no_market'; // 鎖死狀態
                userSettings[coin].lastManualUpdate = Date.now();
                markNotified(coin, 'stoploss');
                slTrig.push(coin);
            }
        });

        const anyTrig = entryTrig.length + targetTrig.length + slTrig.length;
        if (anyTrig > 0) {
            saveSettings(); 
            pushToCloud(false); 
            if (!editingCoin) renderCards();
        }

        entryTrig.forEach(c => {
            const p = formatPrice(marketData[c]?.price);
            const title = `${c} 自動進場`;
            const body = `現價: ${p}\n已自動進場，請注意持倉風險。`;
            sendAlert(`🚀 ${title}`, body, '🚀');
            addNotifLog('🚀', title, body, 'entry');
        });
        targetTrig.forEach(c => {
            const p = formatPrice(marketData[c]?.price);
            const t = formatPrice(userSettings[c]?.target);
            const title = `${c} 已達目標價`;
            const body = `現價: ${p} ≥ 目標: ${t}\n已自動標記為「已達標」。`;
            sendAlert(`🎯 ${title}`, body, '🎯');
            addNotifLog('🎯', title, body, 'target');
        });
        slTrig.forEach(c => {
            const p = formatPrice(marketData[c]?.price);
            const sl = formatPrice(userSettings[c]?.stopLoss);
            const title = `${c} 觸及停損`;
            const body = `現價: ${p} ≤ 停損: ${sl}\n已自動清除持倉狀態。`;
            sendAlert(`🛑 ${title}`, body, '🛑');
            addNotifLog('🛑', title, body, 'stoploss');
        });
    }

                                const open = parseFloat(t.openPrice);
                                const last = parseFloat(t.lastPrice);
                                mM[t.symbol.replace('USDT', '')] = { price: last, change: open > 0 ? ((last - open) / open) * 100 : 0, vol: parseFloat(t.volume), src: 'MEXC' };

            if (oRes.status === 'fulfilled' && oRes.value) {

        editingCoin = null; saveSettings(); closeBottomSheet(); renderCards();

    function getSortValue(coin) {
        const m = marketData[coin] || { price: 0, change: 0 }; const s = userSettings[coin] || {};
        const p = Number(m.price), e = Number(s.entry), t = Number(s.target);
        switch (currentSort) {
            case 'name': return coin;
            case 'change': return Number(m.change) || 0;
            case 'updateTime': return s.lastManualUpdate || 0;
            case 'expectedGain': return (e > 0 && t > 0) ? ((t - e) / e * 100) : -9999;
            case 'targetDist': return (t > 0 && p > 0) ? ((t - p) / p * 100) : 9999;
            case 'entryDist': return (e > 0 && p > 0) ? (Math.abs(p - e) / e * 100) : 9999;
            default: return 0;
        }
    }

    function renderCards() {
        const container = document.getElementById('coin-container');
        const searchVal = (document.getElementById('searchInput').value || document.getElementById('desktopSearchInput').value || '').toUpperCase();
        let list = COIN_LIST.filter(c => c.toUpperCase().includes(searchVal));
        if (currentFilter === 'holding') list = list.filter(c => (userSettings[c] || {}).isHolding);
        if (currentFilter === 'watching') list = list.filter(c => !(userSettings[c] || {}).isHolding);
        if (currentFilter === 'target_reached') list = list.filter(c => { const s = userSettings[c] || {}; const m = marketData[c] || { price: 0 }; return s.manualStatus === 'target_reached' || (s.isHolding && s.target > 0 && Number(m.price) >= Number(s.target)); });
        if (currentFilter === 'no_market') list = list.filter(c => { const s = userSettings[c] || {}; const m = marketData[c] || { src: '--' }; return s.manualStatus === 'no_market' || m.src === '--'; });
        list.sort((a, b) => {
            const va = getSortValue(a), vb = getSortValue(b);
            if (currentSort === 'name') { return sortDirection === 'asc' ? a.localeCompare(b) : b.localeCompare(a) }
            const diff = sortDirection === 'asc' ? va - vb : vb - va;
            return diff;
        });
        container.innerHTML = '';
        if (list.length === 0) { container.innerHTML = '<div class="py-16 text-center text-[#525C6F] text-xs">沒有符合條件的幣種</div>'; return }
        
        list.forEach((coin, i) => {

            const isActivelyHolding = s.isHolding && !targetHit;
            
            const card = document.createElement('div');
            let cls = 'coin-card group';
            if (isActivelyHolding) cls += ' holding';
            if (targetHit) cls += ' target-hit';

            card.style.animationDelay = `${Math.min(i * 30, 300)}ms`;
            
            if (!isTouchDevice) {

                            openBottomSheet(coin);

                }, { passive: true });

                card.addEventListener('touchmove', () => {
                    isMoving = true;
                    clearTimeout(longPressTimer);

            const curPrice = Number(m.price);

            let pnlHtml = '';

                const pnlCalcPrice = targetHit && targetPrice > 0 ? targetPrice : curPrice; 
                const pnlPct = ((pnlCalcPrice - entryPrice) / entryPrice * 100 * (s.leverage || 1));
                const pnlColor = pnlPct >= 0 ? 'text-emerald-400' : 'text-red-400';
                const pnlAbs = s.capital > 0 ? (s.capital * pnlPct / 100).toFixed(2) : null;
                const pnlLabel = targetHit ? '結算盈虧 (估)' : '倉位盈虧 (估)';
                pnlHtml = `<div class="text-right flex flex-col items-end">
                <span class="text-[9px] text-[#525C6F] font-bold uppercase tracking-tight">${pnlLabel}</span>

            let distHtml = '';

                    }
                }
            }

            card.innerHTML = `
            <div class="flex flex-col gap-2.5">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="font-bold text-white text-[16px]">${coin}</span>
                        ${isActivelyHolding ? `<span class="text-[9px] px-1.5 py-0.5 bg-[#638AFF]/15 text-[#638AFF] rounded-md border border-[#638AFF]/30 font-bold tracking-tight">HOLDING</span>` : ''}
                        ${targetHit ? `<span class="text-[9px] px-1.5 py-0.5 bg-amber-500/15 text-amber-400 rounded-md border border-amber-500/30 font-bold tracking-tight">TARGET HIT</span>` : ''}
                    </div>
                    <span class="${chgColor} text-[13px] font-bold font-mono bg-white/[0.03] px-2 py-0.5 rounded-md border border-white/[0.04]">${isUp ? '+' : ''}${Number(m.change).toFixed(2)}%</span>

                             ${s.note ? `<span class="text-[10px] text-amber-400 font-medium italic break-words whitespace-normal">${s.note}</span>` : '<span class="text-[10px] text-[#525C6F] mt-0.5">無備註</span>'}
                         </div>

    let gdOpen = localStorage.getItem('gdOpen') === 'true';
    let gdRealized = parseFloat(localStorage.getItem('gdRealized')) || 0;
    if (userSettings['__GLOBAL__'] && userSettings['__GLOBAL__'].realizedPnL !== undefined) {
        gdRealized = userSettings['__GLOBAL__'].realizedPnL;
        localStorage.setItem('gdRealized', gdRealized);
    }

    function toggleGD() {
        if (window.innerWidth >= 1024) return;
        gdOpen = !gdOpen;
        localStorage.setItem('gdOpen', gdOpen);
        document.getElementById('gd').classList.toggle('open', gdOpen);
        document.getElementById('gd-chevron').style.transform = gdOpen ? 'rotate(180deg)' : '';
    }

    function gdGetFloatPnl() {
        let tot = 0;
        COIN_LIST.forEach(coin => {
            const s = userSettings[coin], m = marketData[coin];
            if (!s || !m || !s.isHolding || !s.capital || !s.entry) return;
            const targetHit = s.manualStatus === 'target_reached' || (s.isHolding && s.target > 0 && Number(m.price) >= Number(s.target));
            if (targetHit) return; 
            const p = Number(m.price), e = Number(s.entry), cap = Number(s.capital), lev = Number(s.leverage || 1);
            if (p > 0 && e > 0) tot += cap * ((p - e) / e) * lev;
        });
        return tot;
    }

    function gdCalcProgress() {
        let sumCapital = 0;
        let sumTargetProfit = 0;
        COIN_LIST.forEach(coin => {
            const s = userSettings[coin];
            if (!s || !s.capital) return;
            const cap = Number(s.capital);
            sumCapital += cap;

            const e = Number(s.entry), t = Number(s.target);
            const lev = Number(s.leverage || 1);
            if (e > 0 && t > 0) {
                sumTargetProfit += cap * lev * ((t - e) / e);
            }
        });
        return { sumCapital, sumTargetProfit };
    }

    function gdSaveLocal() {
        gdRealized = parseFloat(document.getElementById('gd-realized').value) || 0;
        localStorage.setItem('gdRealized', gdRealized);
        gdUpdate();
    }

    function gdSaveCloud() {
        gdSaveLocal();
        userSettings['__GLOBAL__'] = { realizedPnL: gdRealized };
        saveSettings();
        pushToCloud(false);
    }

    function gdUpdate() {
        const floatPnl = gdGetFloatPnl();
        const totalProfit = gdRealized + floatPnl;
        const { sumCapital, sumTargetProfit } = gdCalcProgress();

        const pDisp = document.getElementById('gd-principal-disp');
        if (pDisp) { pDisp.textContent = sumCapital.toFixed(2) + ' U'; pDisp.style.color = 'var(--text-primary)'; }
        
        const tDisp = document.getElementById('gd-target-profit-disp');
        if (tDisp) { tDisp.textContent = sumTargetProfit.toFixed(2) + ' U'; tDisp.style.color = 'var(--green)'; }

        const fEl = document.getElementById('gd-float');
        if (fEl) { fEl.textContent = (floatPnl >= 0 ? '+' : '') + floatPnl.toFixed(2) + ' U'; fEl.style.color = floatPnl >= 0 ? 'var(--green)' : 'var(--red)'; }

        const tpEl = document.getElementById('gd-total-profit');
        if (tpEl) { tpEl.textContent = (totalProfit >= 0 ? '+' : '') + totalProfit.toFixed(2) + ' USDT'; tpEl.style.color = totalProfit >= 0 ? 'var(--accent)' : 'var(--red)'; }

        const pill = document.getElementById('gd-pill');
        if (pill) {
            if (sumCapital > 0) {
                const p2 = totalProfit / sumCapital * 100;
                pill.textContent = (p2 >= 0 ? '+' : '') + p2.toFixed(1) + '%';
                pill.style.color = p2 >= 0 ? 'var(--green)' : 'var(--red)';
            } else { pill.textContent = ''; }
        }

        let overallPct = 0;
        if (sumTargetProfit > 0) {
            overallPct = Math.max(0, Math.min(100, totalProfit / sumTargetProfit * 100));
        }
        
        const barAPct = overallPct;
        const aFill = document.getElementById('gd-bar-a-fill');
        const aDot  = document.getElementById('gd-bar-a-dot');
        const aPctLbl = document.getElementById('gd-bar-a-pct');
        const aMidLbl = document.getElementById('gd-bar-a-mid');
        if (aFill) aFill.style.width = barAPct + '%';
        if (aDot)  aDot.style.left   = barAPct + '%';
        if (aPctLbl) { aPctLbl.textContent = barAPct.toFixed(1) + '%'; aPctLbl.style.color = barAPct >= 50 ? 'var(--green)' : 'var(--amber)'; }
        if (aMidLbl) aMidLbl.textContent = barAPct.toFixed(1) + '%';

        const barBPct = barAPct;
        const bFill = document.getElementById('gd-bar-b-fill');
        const bDot  = document.getElementById('gd-bar-b-dot');
        const bLbl  = document.getElementById('gd-bar-b-lbl');
        const bRight= document.getElementById('gd-bar-b-right');
        const bL    = document.getElementById('gd-bar-b-l');
        const bM    = document.getElementById('gd-bar-b-m');
        const bR    = document.getElementById('gd-bar-b-r');
        if (bFill) bFill.style.width = barBPct + '%';
        if (bDot)  bDot.style.left   = barBPct + '%';
        const curU  = totalProfit;
        const tgtU  = sumTargetProfit;
        if (bL) bL.textContent = sumCapital > 0 ? '$' + sumCapital.toLocaleString() : '$0';
        if (bM) { bM.textContent = (curU >= 0 ? '+$' : '-$') + Math.abs(curU).toFixed(0); bM.style.color = curU >= 0 ? 'var(--green)' : 'var(--red)'; }
        if (bR) bR.textContent = tgtU > 0 ? '+$' + tgtU.toFixed(0) : '--';
        if (bLbl) { bLbl.textContent = (curU >= 0 ? '+$' : '-$') + Math.abs(curU).toFixed(2); bLbl.style.color = curU >= 0 ? 'var(--green)' : 'var(--red)'; }
        if (bRight) bRight.textContent = tgtU > 0 ? '目標 +$' + tgtU.toFixed(0) : '(未設目標)';
    }

    function gdInit() {
        const rEl = document.getElementById('gd-realized');
        if (rEl) rEl.value = gdRealized || '';
        document.getElementById('gd').classList.toggle('open', gdOpen);
        document.getElementById('gd-chevron').style.transform = gdOpen ? 'rotate(180deg)' : '';
        gdUpdate();
    }

    // === INIT ===
    document.getElementById('searchInput').addEventListener('input', renderCards);
    document.getElementById('desktopSearchInput').addEventListener('input', renderCards);
    renderSortOpts();

    setTimeout(() => {
        document.getElementById('sync-bin').value = cloudBin;
        updateSyncStatus();
        if (isAdmin) {
            document.getElementById('admin-user').value = '●●●●●●●●';
            document.getElementById('admin-pass').value = '********';
            document.getElementById('admin-user').disabled = true;
            document.getElementById('admin-pass').disabled = true;
            document.getElementById('admin-tools').classList.remove('hidden');
            document.getElementById('login-btn').innerText = '登出';
            document.getElementById('login-btn').className = 'w-full py-2.5 bg-red-600/20 text-red-400 border border-red-500/30 rounded-lg text-xs hover:bg-red-600/30 transition font-semibold';
        }
        if (cloudBin) { fetchFromCloud(true); }
        gdInit();
        const tgTEl = document.getElementById('tg-token');
        const tgCEl = document.getElementById('tg-chatid');
        if (tgTEl) tgTEl.value = tgToken || '';
        if (tgCEl) tgCEl.value = tgChatId || '';
        updateNotifyStatus();
        updateNotifBadge();
        renderNotifList();
    }, 100);

    let countdown = 180;
    let cloudSyncCounter = 300; 

    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && !editingCoin) {
            console.log('網頁切回前景，自動同步雲端與最新報價...');
            countdown = 180;
            cloudSyncCounter = 300;
            fetchExchangeData();
            if (cloudBin) { 
                fetchFromCloud(true).then(() => {
                    showToast('🔄 已自動同步雲端最新狀態', 'success');
                });
            }
        }
    });

    setInterval(() => {
        countdown--;
        cloudSyncCounter--;
        const cd = document.getElementById('countdown');
        if (editingCoin) { cd.innerHTML = `<span style="color:#fbbf24">⏸ ${countdown}</span>` } else { cd.style.color = ''; cd.textContent = countdown; }
        if (countdown <= 0) { countdown = 180; fetchExchangeData(); }
        if (cloudSyncCounter <= 0 && cloudBin && !editingCoin) { cloudSyncCounter = 300; fetchFromCloud(true); }
        gdUpdate();
    }, 1000);
    fetchExchangeData();

</script>
</body>

</html>
